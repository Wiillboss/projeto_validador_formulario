<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador de Formulário</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="screen">
        <div class="leftSide">
            <img src="image/—Pngtree—financial data office business_4664114.png" alt="">
        </div>
        <div class="rightSide">
            <h1>Crie uma conta</h1>

            <form method="POST" action="cadastro.php" class="b7validator">
                <label for="">
                    Seu nome: <br>
                    <input type="text" name="name" id="" data-rule="required|min=2">
                </label>
                <label for="">
                    Seu e-mail: <br>
                    <input type="email" name="email" id="" data-rule="required|email">
                </label>
                <label for="">
                    Sua senha: <br>
                    <input type="password" name="password" id="" data-rule="required|min=4">
                </label>
                <label for="">
                    <input type="submit" value="Cadastrar">
                </label>
            </form>
            <div>
                Já tem uma conta? <a href="">Faça o Login.</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
